# =============================================================================
# LINUX_CMP - Calamares shellprocess module
# =============================================================================
# Post-install commands executed inside the installed chroot
# =============================================================================

---
dontChroot: false
timeout: 300

script:
  # Enable essential systemd services
  - command: "systemctl enable NetworkManager.service"
  - command: "systemctl enable bluetooth.service"
  - command: "systemctl enable sddm.service"
  - command: "systemctl enable fstrim.timer"
  - command: "systemctl enable power-profiles-daemon.service"
  - command: "systemctl enable firewalld.service"
  - command: "systemctl enable systemd-timesyncd.service"
  - command: "systemctl enable gpu-driver-setup.service"
  - command: "systemctl enable proton-ge-updater.timer"
  - command: "systemctl enable linux-cmp-postinstall.service"

  # Run GPU detection in chroot
  - command: "/usr/local/bin/gpu-driver-setup.sh --no-rebuild"

  # Rebuild initramfs with detected GPU modules
  - command: "mkinitcpio -P"

  # Update GRUB
  - command: "grub-mkconfig -o /boot/grub/grub.cfg"

  # Add first user to gaming groups (Calamares creates the user before this)
  - command: "bash -c 'for u in /home/*/; do user=$(basename $u); usermod -aG gamemode,audio,video,render,input $user 2>/dev/null; done'"

  # Ensure correct permissions
  - command: "chmod 0440 /etc/sudoers.d/gaming"
  - command: "chmod 0755 /usr/local/bin/gpu-driver-setup.sh"
  - command: "chmod 0755 /usr/local/bin/proton-ge-updater.sh"
  - command: "chmod 0755 /usr/local/bin/linux-cmp-postinstall.sh"
  - command: "chmod 0755 /usr/local/bin/linux-cmp-welcome.sh"
