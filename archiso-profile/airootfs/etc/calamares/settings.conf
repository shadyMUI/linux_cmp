# =============================================================================
# LINUX_CMP - Calamares Installer Integration (optional)
# =============================================================================
# If using Calamares as graphical installer, this is the modules sequence.
# Place the full calamares config in /etc/calamares/ on the live ISO.
# =============================================================================

---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - packages
    - grubcfg
    - bootloader
    - shellprocess
    - umount
  - show:
    - finished

branding: linux-cmp
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
