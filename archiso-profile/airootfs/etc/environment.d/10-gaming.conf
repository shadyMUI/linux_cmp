# =============================================================================
# LINUX_CMP - System-wide Environment Variables
# /etc/environment.d/10-gaming.conf
# =============================================================================

# Mesa/Vulkan: enable shader disk cache (faster subsequent loads)
MESA_SHADER_CACHE_MAX_SIZE=10G
MESA_SHADER_CACHE_DIR=/tmp/mesa-shader-cache
RADV_PERFTEST=aco

# Wayland as primary (Plasma Wayland session)
QT_QPA_PLATFORM=wayland;xcb
SDL_VIDEODRIVER=wayland,x11
GDK_BACKEND=wayland,x11
CLUTTER_BACKEND=wayland
XDG_SESSION_TYPE=wayland

# Wine/Proton: enable fsync for maximum game performance
WINEFSYNC=1
WINEESYNC=1
WINE_FULLSCREEN_FSR=1

# Enable Feral GameMode globally for Steam
STEAM_RUNTIME_PREFER_HOST_LIBRARIES=0

# Descriptor for Steam Proton
PROTON_ENABLE_NVAPI=1
PROTON_HIDE_NVIDIA_GPU=0

# PipeWire: lower audio latency
PIPEWIRE_LATENCY="256/48000"

# Enable HDR (KDE Plasma 6+)
KWIN_DRM_USE_EGL_STREAMS=0

# Disable accessibility bus (reduces D-Bus overhead)
NO_AT_BRIDGE=1

# Force UTF-8
LANG=en_US.UTF-8
LC_ALL=en_US.UTF-8
