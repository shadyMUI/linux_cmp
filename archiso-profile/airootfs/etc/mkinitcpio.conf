# /etc/mkinitcpio.conf — Arch Gaming OS
#
# Configurazione ottimizzata per boot rapido su sistema gaming kiosk.
# Hooks minimali, compressione zstd.

# MODULES: pre-caricati nell'initramfs per boot più rapido
# Aggiungi 'amdgpu' o 'nvidia nvidia_modeset nvidia_uvm nvidia_drm' in Fase 3
MODULES=(amdgpu btrfs)

# BINARIES: binari extra da includere nell'initramfs
BINARIES=()

# FILES: file extra da includere nell'initramfs
FILES=()

# HOOKS: ordine critico — ogni hook ha un ruolo specifico
# base      → File essenziali (/bin/sh, mount, ecc.)
# systemd   → Usa systemd nell'initrd (più veloce di busybox, shutdown corretto)
# autodetect→ Rileva hardware e include solo i moduli necessari
# microcode → Carica CPU microcode early (sicurezza + stabilità)
# modconf   → Applica configurazioni da modprobe.d
# kms       → Kernel Mode Setting presto nel boot
# keyboard  → Input da tastiera nell'initrd
# block     → Supporto dispositivi a blocchi
# filesystems→ Driver filesystem (btrfs, vfat)
HOOKS=(base systemd autodetect microcode modconf kms keyboard block filesystems)

# Compressione
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3)
