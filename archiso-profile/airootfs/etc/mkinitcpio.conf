# =============================================================================
# LINUX_CMP - mkinitcpio Configuration
# =============================================================================
# Optimized for fast boot with GPU early-loading
# =============================================================================

# Modules loaded early in initramfs (GPU modules added by gpu-driver-setup.sh)
MODULES=()

# Binary files to include
BINARIES=()

# Additional files
FILES=()

# Hooks: systemd-based for faster parallel boot
# - systemd: replaces base/udev with systemd in initramfs (faster)
# - autodetect: only include modules for detected hardware
# - microcode: CPU microcode early loading
# - modconf: load /etc/modprobe.d configs in initramfs
# - kms: early KMS for flicker-free boot
# - keyboard: keyboard support in initramfs
# - sd-vconsole: console font/keymap
# - block: block device support
# - filesystems: filesystem modules
# - fsck: filesystem check
HOOKS=(systemd autodetect microcode modconf kms keyboard sd-vconsole block filesystems fsck)

# Compression: zstd for speed/ratio balance
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3)
