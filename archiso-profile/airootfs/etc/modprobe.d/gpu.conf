# /etc/modprobe.d/gpu.conf — Arch Gaming OS
# Configurazione moduli GPU
#
# NOTA: Decommentare SOLO la sezione relativa alla propria GPU.
# Non è possibile avere entrambe attive contemporaneamente.

# ============================================================
# AMD (RADV/ACO) — SEZIONE DEFAULT
# ============================================================
# Abilita Display Core (necessario per FreeSync/HDR)
options amdgpu dc=1

# Sblocca tutte le feature di power management
# (incluso overclocking via sysfs, necessario per CoreCtrl/MangoHud)
options amdgpu ppfeaturemask=0xffffffff

# ============================================================
# NVIDIA — DECOMMENTARE SE NVIDIA
# ============================================================
# options nvidia_drm modeset=1
# options nvidia_drm fbdev=1
# options nvidia NVreg_UsePageAttributeTable=1
# options nvidia NVreg_PreserveVideoMemoryAllocations=1
