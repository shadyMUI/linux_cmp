# =============================================================================
# LINUX_CMP - PipeWire Low-Latency Configuration
# /etc/pipewire/pipewire.conf.d/99-gaming-lowlatency.conf
# =============================================================================
# Tuned for minimal audio latency during gaming

context.properties = {
    # Lower quantum = lower latency (256/48000 = ~5.3ms)
    default.clock.quantum = 256
    default.clock.min-quantum = 128
    default.clock.max-quantum = 2048
    default.clock.rate = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 ]
}

context.modules = [
    # Enable real-time scheduling for PipeWire threads
    {   name = libpipewire-module-rt
        args = {
            nice.level = -15
            rt.prio = 88
            rt.time.soft = -1
            rt.time.hard = -1
        }
        flags = [ ifexists nofail ]
    }
]
