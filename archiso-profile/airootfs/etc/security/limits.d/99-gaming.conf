# =============================================================================
# LINUX_CMP - Process Limits for Gaming
# /etc/security/limits.d/99-gaming.conf
# =============================================================================
# These limits ensure games and audio can access real-time scheduling,
# large memory regions, and sufficient file handles.
# =============================================================================

# Allow users in 'gamemode' group to use real-time scheduling
@gamemode    -    rtprio         98
@gamemode    -    nice           -20
@gamemode    -    memlock        unlimited

# Allow 'audio' group real-time priority (PipeWire low-latency)
@audio       -    rtprio         95
@audio       -    nice           -19
@audio       -    memlock        unlimited

# All users: increase file descriptor and process limits
*            -    nofile         1048576
*            -    nproc          unlimited
*            -    core           unlimited

# Specific limits for the gaming user (any regular user)
*            soft rtprio         90
*            hard rtprio         99
*            soft nice           -15
*            hard nice           -20
*            soft memlock        unlimited
*            hard memlock        unlimited
