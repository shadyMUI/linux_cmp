# =============================================================================
# LINUX_CMP - Kernel Tuning for Gaming Performance
# /etc/sysctl.d/99-gaming-performance.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Virtual Memory - Reduce swap aggressiveness, optimize for RAM-heavy games
# ---------------------------------------------------------------------------
# Swappiness: 1 = almost never swap, keep game assets in RAM
vm.swappiness=1

# Lower the threshold at which the kernel starts writing dirty pages
# Prevents sudden I/O storms that cause micro-stutters
vm.dirty_ratio=10
vm.dirty_background_ratio=5

# Faster dirty page writeback (reduce latency spikes)
vm.dirty_writeback_centisecs=500
vm.dirty_expire_centisecs=3000

# Increase max memory map areas (required by many games, Star Citizen, etc.)
vm.max_map_count=2147483642

# VFS cache pressure: lower = keep dentries/inodes in cache longer
vm.vfs_cache_pressure=50

# Disable zone reclaim (NUMA only, prevents latency on multi-socket)
vm.zone_reclaim_mode=0

# Larger page cache readahead for NVMe/SSD (faster asset loading)
vm.page-cluster=0

# Memory overcommit: allow (games often allocate more than they use)
vm.overcommit_memory=1

# ---------------------------------------------------------------------------
# Network - Low latency for online gaming
# ---------------------------------------------------------------------------
# TCP Fast Open (client + server)
net.ipv4.tcp_fastopen=3

# Reduce TCP keepalive for faster dead connection detection
net.ipv4.tcp_keepalive_time=60
net.ipv4.tcp_keepalive_intvl=10
net.ipv4.tcp_keepalive_probes=6

# Enable BBR congestion control (lower latency than CUBIC)
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# Increase network buffer sizes for high-bandwidth gaming
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.rmem_default=1048576
net.core.wmem_default=1048576
net.ipv4.tcp_rmem=4096 1048576 16777216
net.ipv4.tcp_wmem=4096 1048576 16777216

# Reduce connection tracking timeouts
net.netfilter.nf_conntrack_tcp_timeout_established=600

# Disable SYN cookies (trivial latency save on LAN)
net.ipv4.tcp_syncookies=1

# Faster TIME_WAIT recycling
net.ipv4.tcp_tw_reuse=1

# Increase somaxconn for game servers
net.core.somaxconn=8192
net.core.netdev_max_backlog=16384

# Disable IPv6 privacy extensions (stable connection for matchmaking)
net.ipv6.conf.all.use_tempaddr=0

# ---------------------------------------------------------------------------
# Kernel Scheduler - Low latency
# ---------------------------------------------------------------------------
# Minimum granularity for preemption: lower = more responsive
kernel.sched_min_granularity_ns=500000
kernel.sched_wakeup_granularity_ns=500000

# Auto-group for per-TTY task grouping (helps desktop responsiveness)
kernel.sched_autogroup_enabled=1

# Migration cost: lower = faster thread migration between cores
kernel.sched_migration_cost_ns=250000

# Disable kernel watchdog (saves ~1% CPU, removes NMI interrupts)
kernel.nmi_watchdog=0
kernel.watchdog=0

# ---------------------------------------------------------------------------
# IPC & Shared Memory - Required for Wine/Proton
# ---------------------------------------------------------------------------
# Maximum shared memory segment size (16GB)
kernel.shmmax=17179869184
kernel.shmall=4194304

# Message queue limits
kernel.msgmax=65536
kernel.msgmnb=65536

# ---------------------------------------------------------------------------
# Security (relaxed for gaming, still sensible)
# ---------------------------------------------------------------------------
# Allow unprivileged user namespaces (needed by some sandboxed games)
kernel.unprivileged_userns_clone=1

# Disable dmesg restriction (useful for debugging)
kernel.dmesg_restrict=0

# Perf events: allow user-level profiling (MangoHud, perf)
kernel.perf_event_paranoid=1

# Disable magic SysRq (security hardening)
kernel.sysrq=0

# ---------------------------------------------------------------------------
# Filesystem
# ---------------------------------------------------------------------------
# Increase inotify watches (game asset monitoring, file managers)
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=1024

# Increase file handle limits
fs.file-max=2097152
fs.nr_open=1048576
