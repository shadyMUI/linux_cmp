# /etc/sysctl.d/99-gaming.conf — Arch Gaming OS
# Tuning kernel per gaming desktop

# --- Virtual Memory ---
vm.swappiness=10
vm.dirty_ratio=40
vm.dirty_background_ratio=10
vm.vfs_cache_pressure=50
vm.zone_reclaim_mode=0
vm.max_map_count=2147483642

# --- Networking (giochi online) ---
net.core.netdev_max_backlog=16384
net.core.somaxconn=8192
net.ipv4.tcp_fastopen=3
net.ipv4.tcp_max_syn_backlog=8192
net.ipv4.tcp_tw_reuse=1

# --- Kernel ---
kernel.sysrq=0
kernel.timer_migration=0
kernel.nmi_watchdog=0

# --- BORE Scheduler Tuning (solo con kernel CachyOS/BORE) ---
# Abilita BORE (dovrebbe essere già attivo, ma forziamo)
kernel.sched_bore=1
# Cache lifetime per burst time calcolato al fork (ns)
# Default: 75000000 (75ms). Valori più alti = scheduling più stabile
kernel.sched_burst_cache_lifetime=75000000

