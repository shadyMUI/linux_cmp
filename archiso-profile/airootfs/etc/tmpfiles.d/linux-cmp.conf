# =============================================================================
# LINUX_CMP - tmpfiles.d Configuration
# Create required directories on boot
# =============================================================================

# Proton-GE compatibility tools directory
d /usr/share/steam/compatibilitytools.d 0755 root root -

# Linux CMP state directory
d /var/lib/linux-cmp 0755 root root -

# Mesa shader cache (tmpfs for speed)
d /tmp/mesa-shader-cache 1777 root root -

# GameMode group creation
# (handled separately by sysusers.d)
