# =============================================================================
# LINUX_CMP - GRUB Configuration for EFI Boot (Live ISO)
# =============================================================================

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

# Fonts and graphics
insmod font
if loadfont "${prefix}/fonts/unicode.pf2"; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output gfxterm
fi

# Theme
insmod png
set theme="${prefix}/themes/linux-cmp/theme.txt"

# Timeout
set timeout=5
set default="linux_cmp"

# ---------------------------------------------------------------------------
# Boot Entries
# ---------------------------------------------------------------------------

menuentry "Linux CMP - Gaming Mode (Wayland)" --class arch --class linux --id linux_cmp {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-cachyos \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ARCHISO_LABEL% \
        cow_spacesize=4G \
        copytoram=auto \
        splash quiet loglevel=3 \
        nvidia_drm.modeset=1 nvidia_drm.fbdev=1 \
        nowatchdog nmi_watchdog=0 \
        mitigations=off \
        preempt=full threadirqs
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-cachyos.img
}

menuentry "Linux CMP - X11 Fallback" --class arch --class linux --id linux_cmp_x11 {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-cachyos \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ARCHISO_LABEL% \
        cow_spacesize=4G \
        cmp.session=x11 \
        splash quiet loglevel=3 \
        nvidia_drm.modeset=1 nvidia_drm.fbdev=1 \
        nowatchdog
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-cachyos.img
}

menuentry "Linux CMP - Safe Graphics (nomodeset)" --class arch --class linux --id linux_cmp_safe {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-cachyos \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ARCHISO_LABEL% \
        cow_spacesize=4G \
        nomodeset \
        quiet loglevel=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-cachyos.img
}

menuentry "Linux CMP - Copy to RAM (Slow USB)" --class arch --class linux --id linux_cmp_ram {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-cachyos \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ARCHISO_LABEL% \
        cow_spacesize=4G \
        copytoram=y \
        splash quiet loglevel=3 \
        nvidia_drm.modeset=1 nvidia_drm.fbdev=1 \
        nowatchdog nmi_watchdog=0 \
        mitigations=off \
        preempt=full threadirqs
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-cachyos.img
}

if [ "${grub_platform}" == "efi" ]; then
    if [ "${grub_cpu}" == "x86_64" ]; then
        menuentry "UEFI Firmware Settings" --id uefi_firmware {
            fwsetup
        }
    fi
fi

menuentry "System Shutdown" --class shutdown --id shutdown {
    echo "Shutting down..."
    halt
}

menuentry "System Restart" --class reboot --id restart {
    echo "Rebooting..."
    reboot
}
