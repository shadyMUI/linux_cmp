#
# Arch Gaming OS — pacman.conf per il build ISO
# Questa configurazione viene usata da mkarchiso durante la costruzione della ISO.
#

[options]
HoldPkg      = pacman glibc
Architecture = x86_64
CheckSpace
ParallelDownloads = 5
SigLevel     = Required DatabaseOptional
LocalFileSigLevel = Optional

# Repository ufficiali — ordine di priorità
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Multilib: necessario per librerie 32-bit (Steam, Wine, Proton)
# Abilitato fin da subito per non doverlo fare dopo
[multilib]
Include = /etc/pacman.d/mirrorlist

# === Repository Custom (da aggiungere in fasi successive) ===
