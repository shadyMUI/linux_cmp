# =============================================================================
# LINUX_CMP - pacman.conf
# Optimized for gaming: CachyOS + Chaotic-AUR + multilib enabled
# =============================================================================

[options]
HoldPkg      = pacman glibc
Architecture = auto
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 10
SigLevel     = Required DatabaseOptional
LocalFileSigLevel = Optional

# =============================================================================
# CachyOS Repositories (optimized x86-64-v3/v4 packages)
# Provides: linux-cachyos kernel, optimized Mesa, performance-tuned packages
# =============================================================================
[cachyos-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-core-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-extra-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# =============================================================================
# Official Arch Repositories
# =============================================================================
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# =============================================================================
# Multilib (32-bit libraries - MANDATORY for Steam/Wine/Proton)
# =============================================================================
[multilib]
Include = /etc/pacman.d/mirrorlist

# =============================================================================
# Chaotic-AUR (pre-built AUR packages: Proton-GE, Heroic, etc.)
# =============================================================================
[chaotic-aur]
Include = /etc/pacman.d/chaotic-mirrorlist
