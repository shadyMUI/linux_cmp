UI menu
INCLUDE boot/syslinux/archiso_head.cfg

LABEL linux_cmp
    TEXT HELP
        Boot Linux CMP - Ultimate Gaming Distribution
        Kernel: linux-cachyos (BORE scheduler, fsync, futex2)
    ENDTEXT
    MENU LABEL ^Boot Linux CMP (Wayland)
    LINUX boot/x86_64/vmlinuz-linux-cachyos
    INITRD boot/x86_64/initramfs-linux-cachyos.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G copytoram=auto

LABEL linux_cmp_x11
    TEXT HELP
        Boot Linux CMP with X11 fallback session
    ENDTEXT
    MENU LABEL Boot Linux CMP (^X11 Fallback)
    LINUX boot/x86_64/vmlinuz-linux-cachyos
    INITRD boot/x86_64/initramfs-linux-cachyos.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G cmp.session=x11

LABEL linux_cmp_safe
    TEXT HELP
        Boot with safe graphics mode (nomodeset)
    ENDTEXT
    MENU LABEL Boot Linux CMP (^Safe Graphics)
    LINUX boot/x86_64/vmlinuz-linux-cachyos
    INITRD boot/x86_64/initramfs-linux-cachyos.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset

LABEL existing
    TEXT HELP
        Boot existing OS installed on the local hard drive
    ENDTEXT
    MENU LABEL Boot E^xisting OS
    LOCALBOOT 0x80

INCLUDE boot/syslinux/archiso_tail.cfg
