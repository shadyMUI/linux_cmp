# /home/gamer/.config/MangoHud/MangoHud.conf — Arch Gaming OS
# Overlay informativo, non invasivo

### --- Layout ---
legacy_layout=0
position=top-left
round_corners=8
table_columns=3
font_size=20

### --- Metriche ---
fps
fps_color_change
fps_value=30,60

cpu_stats
cpu_temp
cpu_power
cpu_mhz

gpu_stats
gpu_temp
gpu_power
gpu_core_clock
gpu_mem_clock

vram
ram

vulkan_driver
gpu_name

### --- Frame Timing Graph ---
frame_timing=1
frametime=1
frametime_period=5000

### --- Stile ---
background_alpha=0.4
text_color=FFFFFF
gpu_color=2E9D5C
cpu_color=2E85D9
vram_color=AD64C1
ram_color=C26693
engine_color=EB5B5B
frametime_color=00FF7F
background_color=020202

### --- Hotkeys ---
toggle_hud=Shift_R+F12
toggle_logging=Shift_R+F2

### --- Logging ---
output_folder=/home/gamer/.local/share/MangoHud
log_duration=0
