; /etc/gamemode.ini — Arch Gaming OS
; Configurazione GameMode (Feral Interactive)
; Ref: https://github.com/FeralInteractive/gamemode

[general]
reaper_freq=5
desiredgov=performance
softrealtime=auto
inhibit_screensaver=1

[gpu]
apply_gpu_optimisations=accept-responsibility
gpu_device=0
amd_performance_level=high

[cpu]
; Decommentare e adattare per CPU ibride (Intel 12th gen+)
; pin_cores=0-5

[custom]
; Script custom opzionali
; start=/usr/local/bin/gamemode-start.sh
; end=/usr/local/bin/gamemode-end.sh
