# ============================================================
# Arch Gaming OS — Kernel Command Line Parameters
# ============================================================
# Questi parametri vanno nella riga 'options' di systemd-boot:
#   /boot/loader/entries/arch-gaming.conf
#
# Formato: un parametro per riga, con commenti.
# Lo script install-kernel.sh li concatenerà automaticamente.
# ============================================================

# --- Base ---
rw                              # Root read-write (evita remount in init)
quiet                           # Sopprimi messaggi kernel (UX kiosk)
loglevel=3                      # Solo errori critici

# --- Security vs Performance ---
# ATTENZIONE: disabilita TUTTE le mitigazioni CPU (Spectre, Meltdown, etc.)
# Usare SOLO su gaming box dedicata, NON su macchina multi-uso
mitigations=off                 # +5-15% performance CPU-bound

# --- Watchdog ---
nowatchdog                      # Disabilita software watchdog
nmi_watchdog=0                  # Disabilita NMI watchdog

# --- Clocksource ---
tsc=reliable                    # TSC dichiarato reliable senza verifica
clocksource=tsc                 # Forza TSC (il più veloce su x86)

# --- CPU Idle ---
idle=nomwait                    # CPU esce da idle state più rapidamente

# --- PCIe ---
pci=pcie_bus_perf               # Ottimizza PCIe bus per performance

# --- Misc ---
split_lock_detect=off           # Evita penalità su split lock (giochi vecchi)
transparent_hugepage=always     # Forza THP always
