#!/bin/bash
# ============================================================
# customization.cfg — Arch Gaming OS Kernel Configuration
# ============================================================
# Questo file definisce le scelte di configurazione kernel per
# il build basato su linux-cachyos o linux-tkg.
#
# Usato da: PKGBUILD del kernel custom
# ============================================================

# --- Scheduler ---
# bore    = Burst-Oriented Response Enhancer standalone
# cachyos = BORE + tuning aggiuntivi CachyOS (raccomandato)
# eevdf   = Default mainline dal 6.6+
# pds     = Priority and Deadline based Skiplist
# bmq     = Bit Map Queue
_cpusched="cachyos"

# --- Timer Frequency ---
# 1000Hz = tick ogni 1ms, latenza scheduling minima
# Mandatorio per gaming a 144+ fps
_HZ_ticks="1000"

# --- Tick Type ---
# periodic = tick costante, latenza prevedibile (gaming)
# idle     = tickless quando idle (risparmio energetico)
# full     = tickless sempre (server, NON per gaming)
_ticktype="periodic"

# --- Preemption Model ---
# full      = Fully Preemptible Kernel (gaming, desktop interattivo)
# voluntary = Voluntary preemption (compromesso)
# none      = No forced preemption (server, throughput)
_preempt="full"

# --- Compilatore ---
# clang = LLVM/Clang con LTO (raccomandato per performance)
# gcc   = GCC tradizionale (più compatibile)
_compiler="clang"

# --- LTO (Link-Time Optimization) ---
# thin = LTO thin (buon compromesso performance/tempo di compilazione)
# full = LTO full (marginalmente meglio, ma compilazione molto più lunga)
# none = Nessun LTO
_lto="thin"

# --- Ottimizzazione CPU ---
# native_amd   = -march=native per AMD (NON portabile)
# native_intel  = -march=native per Intel (NON portabile)
# generic       = x86-64 generico (massima portabilità)
# x86-64-v3     = AVX2+ (CPU dal 2013+, buon compromesso per ISO)
_processor_opt="native_amd"
# NOTA: cambia a "x86-64-v3" per la build ISO distribuibile

# --- NUMA ---
# disable = Disabilita supporto NUMA (desktop single-socket)
# enable  = Abilita NUMA (server multi-socket, workstation HEDT)
_numa="disable"

# --- Hugepages ---
# always   = THP sempre attivo (gaming, riduce TLB miss)
# madvise  = THP solo su richiesta esplicita
_hugepage="always"

# --- Misc ---
_ftracedisable="true"      # Disabilita ftrace (riduce overhead)
_acs_override="true"       # ACS override per GPU passthrough (VFIO)
